<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WORPL Message Reader</title>
    <link rel="stylesheet" href="./renderer.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>WORPL 쪽지 오토클릭</h1>
          <p>전용 Chrome에서 로그인한 뒤 현재 받은쪽지함 페이지의 신규 쪽지를 클릭해 읽음 처리하고 엑셀로 저장합니다.</p>
        </div>
        <span id="appVersion" class="version">버전 확인 중</span>
      </header>

      <section class="panel">
        <label>
          WORPL 받은쪽지함 URL
          <input id="startUrl" value="http://marsen.marsen.co.kr/?class=Message&action=inbox" />
        </label>
        <div class="actions">
          <button id="openChrome">Chrome 열기</button>
          <span id="chromeStatus" class="status">Chrome을 열고 로그인하세요.</span>
        </div>
      </section>

      <section class="panel controls">
        <div class="mode-group">
          <label><input type="radio" name="mode" value="keyword-new" checked /> 키워드 신규만</label>
          <label><input type="radio" name="mode" value="all-new" /> 신규 전체</label>
        </div>
        <label class="keyword">
          제목 키워드
          <input id="keyword" placeholder="예: BNWAS, 납기, TOUCH" />
        </label>
        <label class="read-limit">
          읽을 수량
          <input id="maxReads" min="1" max="1000" type="number" value="20" />
        </label>
        <div class="actions">
          <button id="preview">미리보기</button>
          <button id="run" class="primary" disabled>읽음 처리 실행</button>
          <button id="pause" disabled>일시정지</button>
        </div>
      </section>

      <section class="panel">
        <div class="result-line">
          <strong>대상 목록</strong>
          <span id="summary" class="status">미리보기 전입니다.</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>순번</th>
                <th>작성자</th>
                <th>제목</th>
                <th>Date</th>
                <th>링크</th>
              </tr>
            </thead>
            <tbody id="rows">
              <tr>
                <td colspan="5" class="empty">표시할 쪽지가 없습니다.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel output">
        <strong>저장 결과</strong>
        <span id="outputPath" class="status">아직 저장된 파일이 없습니다.</span>
        <button id="openOutput" disabled>폴더 열기</button>
      </section>
    </main>
    <script src="./renderer.js"></script>
  </body>
</html>
